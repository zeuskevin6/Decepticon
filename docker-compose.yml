services:
  # LiteLLM Proxy — LLM API Gateway
  # Handles model routing, authentication, usage tracking, billing
  litellm:
    image: ghcr.io/purpleailab/decepticon-litellm:${DECEPTICON_VERSION:-latest}
    build:
      context: .
      dockerfile: containers/litellm.Dockerfile
    # #216: parameterize via DECEPTICON_STACK_NAME. Unset → ``decepticon-litellm``
    # (today's name verbatim). ``DECEPTICON_STACK_NAME=stack2`` →
    # ``decepticon-stack2-litellm``. The ``${VAR:+-${VAR}}`` form emits the
    # dash prefix only when the variable is set so the default stays stable.
    # Using a Decepticon-scoped var instead of COMPOSE_PROJECT_NAME because
    # Compose auto-populates COMPOSE_PROJECT_NAME from the project directory
    # (``Decepticon`` → ``decepticon``), which would produce
    # ``decepticon-decepticon-litellm`` on every default run.
    container_name: decepticon${DECEPTICON_STACK_NAME:+-${DECEPTICON_STACK_NAME}}-litellm
    volumes:
      - ./config/litellm.yaml:/app/config.yaml:ro
      - ${CLAUDE_CREDENTIALS_VOLUME:-/dev/null}:/root/.claude/.credentials.json
      - ${CODEX_AUTH_VOLUME:-/dev/null}:/root/.codex/auth.json
    entrypoint: ["python", "/app/litellm_startup.py"]
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    ports:
      - "127.0.0.1:${LITELLM_PORT:-4000}:4000"
    env_file: .env
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-decepticon-master}
      - LITELLM_SALT_KEY=${LITELLM_SALT_KEY:-sk-decepticon-salt}
      - CODEX_AUTH_PATH=/root/.codex/auth.json
      - DATABASE_URL=postgresql://decepticon:${POSTGRES_PASSWORD:-decepticon}@postgres:5432/litellm
    depends_on:
      postgres:
        condition: service_healthy
    # Cold-start cost (prisma migrate + model-routing load + uvicorn bind):
    # measured 136s on a fresh PostgreSQL volume; varies with disk speed.
    # start_period absorbs environment variability — failures during this
    # window don't count toward retries. test success at any moment flips
    # healthy immediately, so the cushion costs no time on fast hosts.
    # retries is the post-cushion grace for transient failures only;
    # the launcher's --wait-timeout (DECEPTICON_STARTUP_TIMEOUT_SECONDS)
    # is the single user-facing patience knob.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/readiness')"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 300s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - decepticon-net
    restart: unless-stopped

  # PostgreSQL — Persistent storage for LiteLLM
  # Stores: virtual keys, spend logs, user budgets, rate limits
  postgres:
    image: postgres:17-alpine
    container_name: decepticon${DECEPTICON_STACK_NAME:+-${DECEPTICON_STACK_NAME}}-postgres
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: decepticon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-decepticon}
      # Keep shared_buffers small — Decepticon stores only LiteLLM spend
      # logs and web dashboard state; the working set fits in 32MB.
      # Default (128MB) wastes RAM in this context. work_mem is lowered
      # from the 4MB default because queries are simple key-value lookups.
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=32MB"
      - "-c"
      - "work_mem=2MB"
      - "-c"
      - "effective_cache_size=128MB"
      - "-c"
      - "maintenance_work_mem=32MB"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Auto-create decepticon_web DB on first startup (empty volume only).
      # Existing deployments: run the SQL manually or `docker volume rm postgres_data`.
      - ./containers/postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    networks:
      - decepticon-net
    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decepticon -d litellm"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Neo4j — Attack Chain Graph (the agent's persistent working memory)
  # On sandbox-net so cypher-shell from inside sandbox reaches bolt://neo4j:7687
  neo4j:
    image: neo4j:5.24-community
    container_name: decepticon${DECEPTICON_STACK_NAME:+-${DECEPTICON_STACK_NAME}}-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-decepticon-graph}
      NEO4J_server_memory_heap_initial__size: 64m
      NEO4J_server_memory_heap_max__size: 256m
      NEO4J_server_memory_pagecache_size: 64m

      NEO4J_PLUGINS: '["apoc"]'
      # ──────────────────────────────────────────────────────────────────
      # APOC hardening - see docs/security/neo4j-hardening.md.
      #
      # PRIOR CONFIG (REMOVED, do NOT re-add):
      #   NEO4J_dbms_security_procedures_unrestricted: apoc.*
      #   NEO4J_apoc_export_file_enabled: "true"
      #   NEO4J_apoc_import_file_enabled: "true"
      #
      # Neo4j is dual-homed across sandbox-net AND decepticon-net to let
      # the orchestrator on management read findings written from inside
      # the sandbox. Allowing arbitrary APOC procedures - especially the
      # file-I/O family - turns that bridge into a sandbox→management
      # pivot path: a prompt-injection-driven Cypher payload can issue
      #   CALL apoc.cypher.runFile('file:///proc/self/environ')
      # or
      #   CALL apoc.export.csv.query(..., 'file:///root/.config/...')
      # and exfiltrate management-plane secrets.
      #
      # The new posture is allowlist-only. File-I/O, cross-database, and
      # trigger procedures are unreachable from Cypher. Safe query
      # builders (collection / text / path / merge / refactor / periodic)
      # remain available for the kg_add_node / kg_add_edge tool surface.
      NEO4J_dbms_security_procedures_allowlist: >-
        apoc.coll.*,apoc.text.*,apoc.path.*,apoc.create.*,
        apoc.merge.*,apoc.refactor.*,apoc.periodic.iterate,
        apoc.lock.*,apoc.case,apoc.do.case,apoc.do.when,apoc.when,
        apoc.help,apoc.version,apoc.diff.*,apoc.label.*,
        apoc.node.*,apoc.nodes.*,apoc.rel.*,apoc.util.*
      # Strict config validation - refuse to boot on unknown / misspelled
      # config keys so accidental re-introduction of `_unrestricted`
      # under a typo (e.g. `unrestricted`) cannot silently re-open the
      # sandbox→management bridge.
      NEO4J_server_config_strict__validation_enabled: "true"
      # Lock HTTP API access to localhost (the orchestrator talks to
      # Neo4j over Bolt, not HTTP). The web dashboard's Neo4j browser
      # binding lives on 127.0.0.1 below; this disables the HTTP API for
      # any other origin.
      NEO4J_server_http_listen__address: "0.0.0.0:7474"
      NEO4J_dbms_security_http__access__control__allow__origin: ""
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "127.0.0.1:${NEO4J_HTTP_PORT:-7474}:7474"
      - "127.0.0.1:${NEO4J_BOLT_PORT:-7687}:7687"
    networks:
      - sandbox-net
      - decepticon-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 90s
    restart: unless-stopped


  # Evasive Red Team Sandbox
  # Isolated container for executing red-team tools (nmap, whois, etc.)
  # Runs on sandbox-net only — NO access to infra (litellm, postgres).
  # LangGraph reaches sandbox over HTTP at http://sandbox:9999 (FastAPI
  # daemon baked into the image). The previous ``docker exec`` transport
  # via ``/var/run/docker.sock`` was removed in the HTTP-only migration —
  # see decepticon/backends/factory.py for the rationale.
  sandbox:
    image: ghcr.io/purpleailab/decepticon-sandbox:${DECEPTICON_VERSION:-latest}
    # Multi-arch image — linux/amd64 + linux/arm64. Apple Silicon and
    # Linux arm64 hosts pull the native manifest; no Rosetta needed.
    # On an unusual arch the manifest list won't match — force a
    # fallback by adding `platform: linux/amd64` to this service.
    build:
      context: .
      dockerfile: containers/sandbox.Dockerfile
    container_name: decepticon${DECEPTICON_STACK_NAME:+-${DECEPTICON_STACK_NAME}}-sandbox
    networks:
      - sandbox-net
    # ──────────────────────────────────────────────────────────────────
    # Sandbox hardening - see docs/security/sandbox-isolation.md.
    #
    # The Kali sandbox runs root inside the container because raw sockets
    # (nmap SYN scans, packet capture) require root and the container
    # boundary IS the security boundary, not the user boundary. To keep
    # that boundary tight:
    #
    #   - cap_drop ALL, then re-add the minimum set the offensive
    #     toolset actually needs (NET_RAW for SYN scans, NET_ADMIN for
    #     raw routing, NET_BIND_SERVICE for low ports, SYS_PTRACE for
    #     frida/gdb in the Reverser path, SETUID/SETGID for tools like
    #     msfconsole that drop privileges internally).
    #   - no-new-privileges blocks setuid escalation within the
    #     container even if a tool ships with a setuid binary.
    #   - mem_limit caps a runaway scan / fuzzer at 4G so it can't
    #     starve the management plane.
    #   - pids_limit was already 1024; kept.
    #   - read_only: NOT set. The Kali toolset writes to /tmp, /var,
    #     /root, /workspace. A read_only root with tmpfs everywhere
    #     would break ~30 tools. Per-engagement container isolation
    #     (sandbox-isolation.md) is the right structural fix.
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
      - NET_ADMIN
      - NET_BIND_SERVICE
      - SYS_PTRACE
      - SETUID
      - SETGID
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - KILL
    security_opt:
      - no-new-privileges:true
    mem_limit: 4g
    environment:
      # SANDBOX_DAEMON=1 makes containers/sandbox-entrypoint.sh run the
      # FastAPI daemon on port 9999 instead of the legacy
      # ``tail -f /dev/null`` keep-alive. The entrypoint default is 1
      # since the HTTP-only migration; this stanza pins it explicitly so
      # ``docker compose config`` shows intent.
      - SANDBOX_DAEMON=1
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-decepticon-graph}
      - GHIDRA_INSTALL_DIR=/opt/ghidra
      - GHIDRA_MCP_URL=http://ghidra-mcp:8089
    volumes:
      # Bind is engagement-scoped. The launcher sets DECEPTICON_ENGAGEMENT_WORKSPACE
      # to <home>/workspace/<slug> after the engagement picker, so the agent only
      # ever sees its own engagement at /workspace. When the launcher is not in
      # play (raw `make dev`, benchmark harness, dev workflows), the fallback is
      # the whole tree under <home>/workspace.
      - ${DECEPTICON_ENGAGEMENT_WORKSPACE:-${DECEPTICON_HOME:-~/.decepticon}/workspace}:/workspace
      # Skills are no longer baked into this image — they live at
      # ``/app/skills/`` in the LANGGRAPH container (see
      # ``containers/langgraph.Dockerfile``) and are read in-process by
      # ``FilesystemBackend`` via ``CompositeBackend``. The sandbox only
      # owns ``/workspace/`` from here on.
    pids_limit: 4096
    # Run an init process (tini) as PID 1 inside the container. The
    # daemon spawns tmux servers and bash shells; when a tmux server
    # exits, its bash grandchildren are reparented to PID 1. tini reaps
    # those orphans, preventing the <defunct> zombie accumulation that
    # eventually exhausts the PID table (fork() -> EAGAIN). This replaces
    # an in-process SIGCHLD reaper that raced with the daemon's own
    # ``subprocess.run`` calls and clobbered command exit codes to 0.
    init: true
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped


  # Ghidra MCP — optional 245-tool reverse engineering bridge for the
  # Reverser agent. Only built and started when the `reversing` profile is
  # active. The headless backend in decepticon/tools/reversing/ghidra.py
  # works inside the sandbox container without this sidecar; the sidecar
  # adds richer real-time queries (xrefs, batch decompile, P-code) via the
  # bethington/ghidra-mcp plugin.
  #
  # Building this service builds the sandbox image with INSTALL_REVERSING=
  # true (adds JDK 21 + Ghidra 12.1 + radare2 + binwalk, ~500 MB) so it
  # has the analyzeHeadless binary needed below.
  #
  # NOTE: the bethington/ghidra-mcp plugin install is intentionally NOT
  # baked into sandbox.Dockerfile yet — the plugin's release-artifact
  # layout is not stable across Ghidra versions and the integration needs
  # a follow-up PR to pin both sides together. Until then, this service
  # boots Ghidra in headless mode but the MCP HTTP listener will not bind;
  # ghidra_available() will report mcp=false and the tools will fall back
  # to the headless-only path. Tracked separately from #279.
  ghidra-mcp:
    build:
      context: .
      dockerfile: containers/sandbox.Dockerfile
      args:
        INSTALL_REVERSING: "true"
        # SHA-256 pin for the Ghidra 12.1 / 20260513 release. Set this on
        # the build-arg side rather than baking it into the Dockerfile so
        # an upgrade is a single-line change here. To verify, see
        # https://github.com/NationalSecurityAgency/ghidra/releases.
        GHIDRA_SHA256: ""
    image: decepticon-sandbox-reversing:${DECEPTICON_VERSION:-latest}
    container_name: decepticon${DECEPTICON_STACK_NAME:+-${DECEPTICON_STACK_NAME}}-ghidra-mcp
    # Keep the container alive with a long-running analyzeHeadless that
    # imports a placeholder binary. The MCP plugin (when installed) auto-
    # starts its HTTP listener on import.
    entrypoint:
      - /opt/ghidra/support/analyzeHeadless
      - /tmp/ghidra_project
      - dcp
      - -import
      - /bin/true
      - -deleteProject
      - -noanalysis
    environment:
      - GHIDRA_MCP_PORT=8089
      - JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64
    networks:
      - sandbox-net
    mem_limit: 4g
    cpus: 2.0
    restart: unless-stopped
    profiles:
      - reversing

  # LangGraph Platform — Agent API Server
  # Exposes all agents (decepticon, soundwave, recon, exploit, postexploit)
  # as a streaming API on port 2024. Ink CLI connects here.
  langgraph:
    image: ghcr.io/purpleailab/decepticon-langgraph:${DECEPTICON_VERSION:-latest}
    # Append --allow-blocking by default so blockbuster doesn't fatally
    # abort runs on sync I/O in third-party deps (e.g. deepagents'
    # subagents.py uses a sync httpx send in its atask path). Decepticon's
    # own sync calls have been structurally fixed (see #325), but the
    # third-party calls remain. Set LANGGRAPH_STRICT_ASYNC=1 in .env to
    # opt out and reinstate the fatal-on-sync behavior (useful for
    # debugging async issues in your own code).
    # Note: $$ escapes compose interpolation so the literal $LANGGRAPH_STRICT_ASYNC
    # reaches the shell — the env var is set on the container via env_file:.env,
    # and the if/else decision happens at container start, not at compose render.
    command:
      - sh
      - -c
      - >
        if [ -z "$${LANGGRAPH_STRICT_ASYNC:-}" ]; then
          exec langgraph dev --host 0.0.0.0 --port 2024 --no-browser --n-jobs-per-worker 10 --allow-blocking;
        else
          exec langgraph dev --host 0.0.0.0 --port 2024 --no-browser --n-jobs-per-worker 10;
        fi
    build:
      context: .
      dockerfile: containers/langgraph.Dockerfile
      args:
        # Stamps pyproject.toml's version field at build time. Independent
        # of the image tag selector above — VERSION can be unset locally
        # (defaults to 0.0.0 sentinel) while the tag is still ":dev".
        VERSION: ${VERSION:-0.0.0}
    container_name: decepticon${DECEPTICON_STACK_NAME:+-${DECEPTICON_STACK_NAME}}-langgraph
    ports:
      - "127.0.0.1:${LANGGRAPH_PORT:-2024}:2024"
    env_file: .env
    environment:
      - DECEPTICON_LLM__PROXY_URL=http://litellm:4000
      - DECEPTICON_LLM__PROXY_API_KEY=${LITELLM_MASTER_KEY:-sk-decepticon-master}
      # HTTPSandbox transport target. ``sandbox`` is the compose service
      # name (resolves via the shared ``sandbox-net`` network below). Port
      # 9999 is the FastAPI daemon baked into the sandbox image (see
      # ``containers/sandbox-entrypoint.sh`` — daemon mode is the default).
      - SAAS_SANDBOX_URL=http://sandbox:9999
      - DECEPTICON_NEO4J_URI=bolt://neo4j:7687
      - DECEPTICON_NEO4J_USER=neo4j
      - DECEPTICON_NEO4J_PASSWORD=${NEO4J_PASSWORD:-decepticon-graph}
      # Skillogy: opt-in via env var; agents use it instead of the
      # file-system-backed SkillsMiddleware when DECEPTICON_USE_SKILLOGY=1.
      - DECEPTICON_USE_SKILLOGY=${DECEPTICON_USE_SKILLOGY:-0}
      - DECEPTICON_SKILLOGY_URL=http://skillogy:9100
      # Neo4j is the sole KG backend (no DECEPTICON_KG_BACKEND needed)
      # BENCHMARK_MODE flows in via `env_file: .env` above — no need to
      # re-declare it here. Set BENCHMARK_MODE=1 in .env to engage CTF/XBOW
      # benchmark mode (rule overrides + challenge context inject).
    volumes:
      # Mount the OAuth credential files read-only so the LLM factory can
      # check file presence + valid JSON before adding a method to the
      # fallback chain. Without this the factory would trust the
      # ``DECEPTICON_AUTH_*`` boolean alone and a stale flag
      # (e.g. ``codex logout`` after onboard) would generate a 401-fallback
      # storm. Read-only because langgraph never refreshes tokens — that's
      # the LiteLLM container's job.
      - ${CLAUDE_CREDENTIALS_VOLUME:-/dev/null}:/root/.claude/.credentials.json:ro
      - ${CODEX_AUTH_VOLUME:-/dev/null}:/root/.codex/auth.json:ro
    # Wait for litellm to be healthy: langgraph has retry logic but the launcher
    # uses `compose up --wait` and needs healthy as the single readiness signal.
    depends_on:
      litellm:
        condition: service_healthy
      sandbox:
        condition: service_started
      neo4j:
        condition: service_healthy
    # python urllib — same pattern as the litellm healthcheck. Runs entirely
    # inside the container so host OS (Linux / macOS / Windows) is irrelevant;
    # avoids relying on curl/wget being present in the langgraph base image.
    # start_period covers FastAPI + graph-server boot after litellm flips
    # healthy; retries is post-cushion grace.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:2024/ok')"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 90s
    networks:
      # decepticon-net: reach litellm, postgres, neo4j (infra plane).
      # sandbox-net: reach the sandbox container's HTTP daemon
      # (HTTPSandbox transport) on the same bridge neo4j uses, while
      # keeping the sandbox itself isolated from the infra plane.
      - decepticon-net
      - sandbox-net
    restart: unless-stopped


  # Web Dashboard — Next.js UI
  # Migrations run automatically at startup via web-entrypoint.sh (prisma migrate deploy).
  web:
    image: ghcr.io/purpleailab/decepticon-web:${DECEPTICON_VERSION:-latest}
    build:
      context: .
      dockerfile: containers/web.Dockerfile
      args:
        VERSION: ${VERSION:-0.0.0}
    container_name: decepticon${DECEPTICON_STACK_NAME:+-${DECEPTICON_STACK_NAME}}-web
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"
      - "127.0.0.1:${TERMINAL_PORT:-3003}:3003"
    env_file: .env
    environment:
      - NEXT_PUBLIC_DECEPTICON_EDITION=oss
      - LANGGRAPH_API_URL=http://langgraph:2024
      - NEXT_PUBLIC_LANGGRAPH_API_URL=http://localhost:${LANGGRAPH_PORT:-2024}
      - NEXT_PUBLIC_TERMINAL_WS_URL=ws://localhost:${TERMINAL_PORT:-3003}
      - DATABASE_URL=postgresql://decepticon:${POSTGRES_PASSWORD:-decepticon}@postgres:5432/decepticon_web
      - WORKSPACE_PATH=/workspace
    volumes:
      - ${DECEPTICON_HOME:-~/.decepticon}/workspace:/workspace
    depends_on:
      langgraph:
        condition: service_healthy
      postgres:
        condition: service_healthy
    # node http.get — Next.js standalone images include node but not curl/wget.
    # `r.resume()` drains the body so the request finishes; without it the
    # callback can resolve before close, leaving the process hanging until
    # docker's healthcheck timeout fires. start_period covers prisma migrate
    # + Next.js boot; retries is post-cushion grace.
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', r => { r.resume(); process.exit(r.statusCode < 500 ? 0 : 1); }).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 90s
    networks:
      - decepticon-net
    restart: unless-stopped

  # Ink CLI — Interactive terminal UI
  # Runs via: docker compose run --rm cli
  cli:
    image: ghcr.io/purpleailab/decepticon-cli:${DECEPTICON_VERSION:-latest}
    build:
      context: .
      dockerfile: containers/cli.Dockerfile
      args:
        VERSION: ${VERSION:-0.0.0}
    container_name: decepticon${DECEPTICON_STACK_NAME:+-${DECEPTICON_STACK_NAME}}-cli
    stdin_open: true
    tty: true
    environment:
      - DECEPTICON_API_URL=http://langgraph:2024
      - TERM=xterm-256color
      - COLORTERM=truecolor
      - DECEPTICON_VERSION=${DECEPTICON_VERSION:-}
    depends_on:
      langgraph:
        condition: service_healthy
    networks:
      - decepticon-net
    profiles:
      - cli

  # ── C2 Infrastructure (profile-based, default: c2-sliver) ───────────
  # Each C2 framework runs as a profile-based service on sandbox-net.
  # Default: COMPOSE_PROFILES=c2-sliver in .env → starts with `docker compose up -d`
  # Swap: change COMPOSE_PROFILES to c2-havoc, etc.
  # Agent connects via: sliver-client (pre-installed in sandbox)
  c2-sliver:
    image: ghcr.io/purpleailab/decepticon-c2-sliver:${DECEPTICON_VERSION:-latest}
    # Multi-arch image — see decepticon-sandbox above for the same notes.
    build:
      context: .
      dockerfile: containers/c2-sliver.Dockerfile
    container_name: decepticon${DECEPTICON_STACK_NAME:+-${DECEPTICON_STACK_NAME}}-c2-sliver
    networks:
      - sandbox-net
    cap_add:
      - NET_BIND_SERVICE
    volumes:
      - sliver_data:/home/sliver/.sliver
    pids_limit: 512
    restart: unless-stopped
    profiles:
      - c2-sliver

  # ─── Optional: OpenTelemetry collector for self-hosted traces ──────────
  # Uncomment to receive Decepticon spans locally (Jaeger all-in-one).
  # Decepticon stays default-off; set OTEL_ENABLED=1 plus the env vars below
  # in the langgraph service to actually emit spans.
  #
  # jaeger:
  #   image: jaegertracing/all-in-one:1.60
  #   container_name: decepticon${DECEPTICON_STACK_NAME:+-${DECEPTICON_STACK_NAME}}-jaeger
  #   environment:
  #     - COLLECTOR_OTLP_ENABLED=true
  #   ports:
  #     - "127.0.0.1:${JAEGER_UI_PORT:-16686}:16686"
  #     - "127.0.0.1:${OTEL_HTTP_PORT:-4318}:4318"
  #   networks:
  #     - decepticon-net
  #
  # To export Decepticon spans to this service, set on the langgraph service:
  #   - OTEL_ENABLED=1
  #   - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318/v1/traces
  #   - OTEL_SERVICE_NAME=decepticon

  skillogy:
    image: ghcr.io/purpleailab/decepticon-skillogy:${DECEPTICON_VERSION:-latest}
    build:
      context: .
      dockerfile: containers/skillogy.Dockerfile
    container_name: decepticon${DECEPTICON_STACK_NAME:+-${DECEPTICON_STACK_NAME}}-skillogy
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "127.0.0.1:${SKILLOGY_REST_PORT:-9100}:9100"
    environment:
      - SKILLOGY_REST_PORT=9100
      - SKILLOGY_NEO4J_URI=bolt://neo4j:7687
      - SKILLOGY_NEO4J_USER=neo4j
      - SKILLOGY_NEO4J_PASSWORD=${NEO4J_PASSWORD:-decepticon-graph}
      - SKILLOGY_AUTO_INGEST=${SKILLOGY_AUTO_INGEST:-1}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9100/v1/health')"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 30s
    networks:
      - decepticon-net
    restart: unless-stopped

volumes:
  postgres_data:
  sliver_data:
  neo4j_data:
  neo4j_logs:

networks:
  decepticon-net:
    driver: bridge
  sandbox-net:
    driver: bridge
