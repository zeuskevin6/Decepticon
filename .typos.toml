# Security / cloud / legal acronyms typos misreads (it splits the
# token and flags the prefix — e.g. "NDAs" → suggests "ANDAs" because
# "ND" looks like a typo of "AND"). extend-identifiers is the right
# knob: it whitelists the FULL identifier (case-sensitive, no token
# splitting) rather than a lowercased word fragment.
[default.extend-identifiers]
"NDA" = "NDA"        # Non-Disclosure Agreement
"NDAs" = "NDAs"      # Non-Disclosure Agreements (plural)
"AKS" = "AKS"        # Azure Kubernetes Service
"RTO" = "RTO"        # Red Team Operator (also Recovery Time Objective)

[files]
# Skip vendored / generated content from typos
extend-exclude = [
    "package-lock.json",
    "uv.lock",
    "go.sum",
    "*.lock",
    "*.snap",
    "assets/**",
    "benchmark/results/**",
    "packages/decepticon/decepticon/skills/_corpus/**",
    "reference/**",
    # ICS/OT skill bodies are dense with industrial-protocol jargon that
    # typos misreads: "OT" (Operational Technology), "ot" inside
    # "ics ot ..." trigger lists, "BA" (BACnet/Building Automation), etc.
    # Scoped to this directory so the rest of the tree keeps full typo
    # coverage rather than globally allow-listing two-letter tokens.
    "packages/decepticon/decepticon/skills/standard/exploit/ics-ot/**",
]
