# typos (crate-ci/typos) per-repo configuration
#
# Decepticon's skill bodies + offensive tooling include security jargon
# and exfiltrated-data strings that `typos` mistakes for misspellings.
# Allowlist them here rather than disable typos entirely.

[default]
extend-ignore-re = [
    # Base64-looking strings inside skill examples (JWT samples, AWS keys, etc.)
    "eyJ[A-Za-z0-9_-]+",
    "AKIA[0-9A-Z]{16}",
    "AIza[0-9A-Za-z\\-_]{35}",
    "sk_live_[0-9a-zA-Z]+",
    "pk_live_[0-9a-zA-Z]+",
    # Hash literals + UUIDs
    "[a-f0-9]{40,64}",
    # Mimikatz / Impacket command excerpts
    "lsadump::|sekurlsa::|kerberos::|misc::",
    # Hyphenated mis-* compound words — typos splits on the hyphen and
    # flags the "mis" token as a typo of miss/mist. The whole compound
    # is correct (mis-fire, mis-split, mis-configure, mis-allocation).
    "mis-[a-z]+",
    # "ICS-OT" / "ICS/OT" (Industrial Control Systems / Operational
    # Technology) — typos splits on the separator and flags the bare "OT"
    # token. Ignore only this exact compound so we don't globally
    # allow-list "OT" (the rest of the tree keeps full coverage; the
    # ics-ot skill bodies are handled by the files exclude below).
    "ICS[-/]OT",
]

